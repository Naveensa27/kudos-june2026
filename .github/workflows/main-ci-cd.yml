# GitHub Actions workflow for main branch continuous integration and deployment
#-----------------------------------------------------------------
name: main-ci-cd

on:
  push:
    branches:
      - main

jobs:
  install:
    name: "📦 Install Dependencies"
    runs-on: ubuntu-latest
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "📥 Install dependencies"
        run: npm ci

  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🧹 Lint"
        run: npm run lint

  test:
    name: "🧪 Test (CI)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🧪 Run tests"
        run: npm run test:ci

  security-scan:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "🔐 Validate SNYK_TOKEN"
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "❌ SNYK_TOKEN secret is missing"
            exit 1
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: "🔍 Snyk Test (Fail on vulnerabilities)"
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

      - name: "📊 Snyk Monitor (Send report to dashboard)"
        if: always()
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor

  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Set up Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🏗️ Build"
        run: npm run build

      - name: "📦 Upload build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  docker:
    name: "🐳 Build & Push Docker Image"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "🧩 Set up QEMU"
        uses: docker/setup-qemu-action@v2

      - name: "🧰 Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "🔐 Log in to Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: "🚀 Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kudos-app-26thdec:latest
            ${{ secrets.DOCKER_USERNAME }}/kudos-app-26thdec:${{ github.sha }}
  
  # 7. Deploy to AWS EC2 (Continuous Deployment)
  # ------------------------------------------------
  deploy-ec2:
    name: "🚀 Deploy to AWS EC2"
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: "🚀 Deploy application on EC2"
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/kudos-app-26thdec:latest

            echo "Stopping old container..."
            docker stop kudos-app-26thdec || true
            docker rm kudos-app-26thdec || true

            echo "Starting new container..."
            docker run -d \
              --name kudos-app-26thdec \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/kudos-app-26thdec:latest
#end of main-ci-cd.yml