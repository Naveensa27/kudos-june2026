#-----------------------------------------------------------------
# GitHub Actions Workflow: PR to Main (Quality Gate)
#-----------------------------------------------------------------
name: pr-gatekeeper

on:
  pull_request:
    branches:
      - main

jobs:
  install:
    name: "📦 Install dependencies"
    runs-on: ubuntu-latest
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "🧾 Diagnostics"
        run: |
          echo "Node:" && node -v
          echo "NPM:" && npm -v

      - name: "📥 Install dependencies"
        run: npm ci

  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🧹 Lint"
        run: npm run lint

  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🧪 Run tests"
        run: npm run test:ci

  security:
    name: "🛡️ Security (CodeQL & Snyk)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "🔐 Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: "🔎 CodeQL Analyze"
        uses: github/codeql-action/analyze@v3

      - name: "🔍 Snyk Security Scan"
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          
      - name: "📊 Snyk Monitor (Send report to dashboard)"
        if: ${{ github.event.pull_request.head.repo.full_name == github.repository }} || always()
        uses: snyk/actions/node@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor    

  build:
    name: "🏗️ Build"
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: "🔁 Checkout"
        uses: actions/checkout@v4

      - name: "⚙️ Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "📥 Install dependencies"
        run: npm ci

      - name: "🏗️ Build"
        run: npm run build

      - name: "📦 Upload build artifact"
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

// end of pr-gatekeeper.yml